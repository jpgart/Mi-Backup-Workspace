name: Deploy Analytics Dashboard

on:
  push:
    branches: ["main", "master", "feat/vogt-static-dashboard"]
    paths:
      - 'analytics-system/apps/vogt-dashboard/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Pages
        uses: actions/configure-pages@v5
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Desplegamos la carpeta de la nueva app estática V3 (Vogt Dashboard)
          path: './analytics-system/apps/vogt-dashboard'
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
