name: Deploy Analytics Dashboard

on:
  push:
    branches: ["main", "master"]
    paths:
      - 'analytics-system/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './analytics-system/apps/dashboard-react/package-lock.json'

      - name: Install dependencies
        run: npm install
        working-directory: ./analytics-system/apps/dashboard-react

      - name: Build
        run: npm run build
        working-directory: ./analytics-system/apps/dashboard-react
        
      - name: Setup Pages
        uses: actions/configure-pages@v4
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Desplegamos la carpeta dist generada por Vite
          path: './analytics-system/apps/dashboard-react/dist'
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
